# Access-control rules for the django-apcore ACL demo.
#
# Loaded by apcore via APCORE_ACL_PATH and enforced by the Executor on every
# module call. Rules are evaluated first-match-wins; a call that matches no
# rule falls through to `default_effect`.
#
# The `roles` condition matches the roles carried by the request's Identity,
# which DjangoContextFactory extracts from `request.user.groups`.
default_effect: deny

rules:
  - description: Admins may call any module
    callers: ["*"]
    targets: ["*"]
    effect: allow
    conditions:
      roles: ["admin"]

  - description: Anyone (including anonymous) may read the order list
    callers: ["*"]
    targets: ["orders.list"]
    effect: allow

  # Everything else (e.g. orders.delete for a non-admin) falls through to
  # default_effect: deny -> the Executor raises ACLDeniedError.
