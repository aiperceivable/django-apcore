services:
  web:
    build:
      context: ..
      dockerfile: example/Dockerfile
    command: >
      sh -c "python manage.py migrate --run-syncdb &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=demo.settings

  mcp:
    build:
      context: ..
      dockerfile: example/Dockerfile
    command: bash entrypoint.sh
    ports:
      - "9090:9090"
    environment:
      - DJANGO_SETTINGS_MODULE=demo.settings
      # Output formatting (apcore-mcp 0.10.0+)
      # - APCORE_OUTPUT_FORMATTER=apcore_toolkit.to_markdown
      # AI Enhancement (apcore-toolkit 0.2.0+)
      # - APCORE_AI_ENHANCE=true
      # - APCORE_AI_ENABLED=true
      # - APCORE_AI_ENDPOINT=http://host.docker.internal:11434/v1
      # - APCORE_AI_MODEL=qwen:0.6b
      # JWT Authentication (apcore-mcp >= 0.10.0)
      # - APCORE_JWT_SECRET=change-me-in-production
      # - APCORE_JWT_ALGORITHM=HS256
      # - APCORE_JWT_AUDIENCE=task-manager-api
      # - APCORE_JWT_ISSUER=task-manager
